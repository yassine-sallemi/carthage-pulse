# Reddit LLM Pipeline Configuration
# INGESTION SERVICE
ingestion:
  subreddits:
    - Tunisia
    - Tunisie
  poll_interval: 30
  fetch_limit: 100
  initial_fetch: true
  user_agent: "FadhlounEl7anoun/1.0 (by /u/Familiar-System542)"
  endpoints:
    - new
    - comments

# PROCESSING SERVICE
processing:
  batch_size: 5
  max_retries: 3

# LLM Provider - options: ollama, openai, openrouter, anthropic, dummy
llm:
  provider: openrouter
  model: meta-llama/llama-3.3-70b-instruct
  api_key: ${OPENROUTER_API_KEY} # Reads from .env or environment
  # Kafka Settings
kafka:
  bootstrap_servers:
    - localhost:9092
  # Ingestion output topic
  ingestion_topic: reddit-events
  # Processing input/output topics
  processing_input_topic: reddit-events
  processing_output_topic: reddit-events-enriched
  processing_dlq_topic: reddit-events-dlq
  processing_group_id: reddit-enricher-group
  # Storage input topic
  storage_input_topic: reddit-events-enriched
  storage_group_id: reddit-storage-group

# MinIO / S3 Storage
minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: reddit-events
  secure: false

# STORAGE SERVICE
storage:
  batch_size: 10

# SPEED LAYER
# Tumbling window aggregation for real-time topic pulse
speed:
  window_seconds: 60  # Duration of each aggregation window (in seconds). Windows align to clock boundaries (e.g., at :00, :60s).
  late_event_grace_seconds: 30  # Max age of events allowed into current window. Older events are dropped.
  max_events_per_window: 10000  # Memory safety limit. Events beyond this are dropped to prevent OOM.

# POSTGRES (Serving Layer)
postgres:
  host: localhost
  port: 5432
  user: reddit
  password: reddit
  database: reddit

# Enrichment Prompt (DO NOT CHANGE THE INSTRUCTIONS OR EXPECTED OUTPUT SCHEMA)
prompt: |
  You are an expert NLP analyst specializing in Tunisian social media content.

  Analyze each text and return ONLY a JSON array with one object per item.
  Each object must have these EXACT fields:
  - languages: array of detected language codes only from [en, fr, ar, darija_ar, darija_lat]
  - translation: Full English translation/normalized version
  - sentiment_score: float from -1.0 (very negative) to 1.0 (very positive)
  - intent: one of [question, complaint, discussion, support_request, meme_joke, news_sharing, story_time]
  - topics: array of 2-4 main topics (e.g., "telecommunications", "politics", "football")
  - entities: array of {name, type} where type is Person, Organization, or Location only

  Return ONLY valid JSON array, no markdown or explanations.
