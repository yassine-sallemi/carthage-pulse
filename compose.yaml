services:
  kafka:
    image: apache/kafka-native
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9091
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - reddit-network
    healthcheck:
      test: kafka-broker-api-versions.sh --bootstrap-server kafka:9093 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: kafbat/kafka-ui:main
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka
    networks:
      - reddit-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - reddit-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: reddit_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reddit
      POSTGRES_PASSWORD: reddit
      POSTGRES_DB: reddit
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reddit-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U reddit -d reddit" ]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    user: "0"
    volumes:
      - ./grafana_provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - reddit-network
    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    
  spark-master:
    image: mounirbs-local/spark-python3-java17:3.5.4
    user: root
    build:
      context: ./
      dockerfile: ./spark/Dockerfile
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    labels:
      kompose.service.expose: true
      kompose.service.type: clusterip
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_DAEMON_MEMORY=2g
      - SPARK_MASTER_OPTS="-Dspark.master.rest.enabled=false"
      - PYSPARK_PYTHON=python3
    entrypoint:
      - "bash"
      - "-c"
      - "/opt/spark/sbin/start-master.sh && tail -f /dev/null"
    volumes:
      - ./logs:/opt/spark/logs
    networks:
      - reddit-network

  spark-connect:
    image: mounirbs-local/spark-python3-java17:3.5.4
    user: root
    container_name: spark-connect
    hostname: spark-connect
    ports:
      - "4040:4040"
      - "15002:15002"
    labels:
      kompose.service.expose: true
      kompose.service.type: clusterip
    environment:
      - PYSPARK_PYTHON=python3
    depends_on:
      - spark-master
    volumes:
      - ./logs:/opt/spark/logs
      - ./data:/data:rw
    networks:
      - reddit-network
    command:
      - "bash"
      - "-c"
      # master: spark master endpoint
      # deploy-mode: Whether to launch the driver program locally ("client") or on one of the worker machines inside the cluster ("cluster"). Only client is supported
      # executor-memory: Memory per executor (e.g. 1000M, 2G) (Default: 1G)
      # executor-core: Spark standalone, YARN and Kubernetes only. Number of cores used by each executor. (Default: 1 in YARN and K8S modes, or all available cores on the worker in standalone mode)
      - "/opt/spark/sbin/start-connect-server.sh --master spark://spark-master:7077 --deploy-mode client --executor-memory 2G --executor-cores 1 --jars /opt/spark/jars/spark-connect_2.12-3.5.4.jar && tail -f /dev/null"

  spark-worker:
    image: mounirbs-local/spark-python3-java17:3.5.4
    user: root
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    labels:
      kompose.service.expose: true
      kompose.service.type: clusterip
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - PYSPARK_PYTHON=python3
    entrypoint:
      - "bash"
      - "-c"
      - "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"
    networks:
      - reddit-network
    volumes:
      - ./data:/data:rw
      - ./logs:/opt/spark/logs


volumes:
  kafka_data:
  minio_data:
  postgres_data:
  grafana_data:

networks:
  reddit-network:
    name: reddit-network
    driver: bridge
